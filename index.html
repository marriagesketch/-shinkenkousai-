<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>結婚準備 すり合わせ</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

</head>

<body>
<div class="container">

<div class="form-header">
  <h1>結婚準備 すり合わせ</h1>
  <p class="form-description">本アンケートは、結婚準備にあたっての生活面・お金・もしもの時の希望などのすり合わせでの使用を目的としています。<br>
  プライバシー保護：LINE IDはハッシュ化（暗号化）して保存されます。表示名・プロフィール画像・メールアドレスなどは取得されません。<br>
  再回答について：同じLINEアカウントから回答された場合、以前の内容は上書きされます。</p>
</div>

<!-- ビューモード表示エリア（共有リンクで開いたとき） -->
<div id="viewMode"></div>

<!-- Q1 -->
<label>Q1 家事分担について、ルールを決めておきたいですか？</label>
<label><input type="radio" name="q1" value="a1-1">決めたい</label>
<label><input type="radio" name="q1" value="a1-2">一緒に暮らし始めてから決めたい</label>
<label><input type="radio" name="q1" value="a1-3">ルールは決めずにやっていきたい</label>

<!-- Q2 -->
<label>Q2 年収はいくらですか？今年の見込み年収を教えてください。副業があれば、本業、副業それぞれいくらかも教えてください。</label>
<textarea id="q2" class="detail-textarea"></textarea>

<!-- Q3 -->
<label>Q3 貯金はいくらありますか？現金での貯金額を教えてください。</label>
<textarea id="q3" class="detail-textarea"></textarea>

<!-- Q4 -->
<label>Q4 株などの金融資産や不動産など、現金以外での貯蓄があれば、何を持っているか、必要であれば現金化できるようなものか教えてください。</label>
<textarea id="q4" class="detail-textarea"></textarea>

<!-- Q5 -->
<label>Q5 現在の支出状況について教えてください。</label>
<textarea id="q5" class="detail-textarea"></textarea>

<!-- Q6 -->
<label>Q6 現在の勤め先で、結婚休暇などの結婚支援制度はありますか？あれば具体的に教えてください。</label>
<textarea id="q6" class="detail-textarea"></textarea>

<!-- Q7 -->
<label>Q7 現在の勤め先で、出産・育児支援制度はどんなものがありますか？</label>
<textarea id="q7" class="detail-textarea"></textarea>

<!-- Q8 -->
<label>Q8 ベッド、寝室について理想はありますか？</label>
<label><input type="radio" name="q8" value="a8-1">大きめのベッドで一緒に寝たい</label>
<label><input type="radio" name="q8" value="a8-2">同じ寝室でベッドは分けたい</label>
<label><input type="radio" name="q8" value="a8-3">寝室を分けたい</label>

<!-- Q9 -->
<label>Q9 結納や両家顔合わせはしますか？</label>
<label><input type="radio" name="q9" value="a9-1">したい</label>
<label><input type="radio" name="q9" value="a9-2">するつもりはないがお相手次第</label>
<label><input type="radio" name="q9" value="a9-3">自身の両親と話していないので後日相談させてほしい</label>

<!-- Q10 -->
<label>Q10 婚約指輪はほしいですか？もしくはあげたいですか？</label>
<label><input type="radio" name="q10" value="a10-1">ほしい、もしくはあげたい</label>
<label><input type="radio" name="q10" value="a10-2">相手が望むならあげたい</label>
<label><input type="radio" name="q10" value="a10-3">ほしくない、もしくはあげたくない</label>

<!-- Q11 -->
<label>Q11 結婚指輪はほしいですか？</label>
<label><input type="radio" name="q11" value="a11-1">ほしい</label>
<label><input type="radio" name="q11" value="a11-2">相手が望むならほしい</label>
<label><input type="radio" name="q11" value="a11-3">自分はいらないが、相手が望むなら相手の分はあげたい</label>
<label><input type="radio" name="q11" value="a11-4">自分はほしいが、相手の分は相手の意思に任せる</label>
<label><input type="radio" name="q11" value="a11-5">ほしくないし、あげたくもない</label>

<!-- Q12 -->
<label>Q12 結婚式はしたいですか？</label>
<label><input type="radio" name="q12" value="a12-1">したい</label>
<label><input type="radio" name="q12" value="a12-2">相手が望むならしてもよい</label>
<label><input type="radio" name="q12" value="a12-3">したくない</label>

<!-- Q13 -->
<label>Q13 フォトウェディングはしたいですか？</label>
<label><input type="radio" name="q13" value="a13-1">したい</label>
<label><input type="radio" name="q13" value="a13-2">相手が望むならしてもよい</label>
<label><input type="radio" name="q13" value="a13-3">したくない</label>

<!-- Q14 -->
<label>Q14 新婚旅行は行きたいですか？</label>
<label><input type="radio" name="q14" value="a14-1">海外旅行に行きたい</label>
<label><input type="radio" name="q14" value="a14-2">国内旅行に行きたい</label>
<label><input type="radio" name="q14" value="a14-3">新婚旅行に行くことはあまり考えていない</label>

<!-- Q15 -->
<label>Q15 婚前契約書の作成はしたいですか？</label>
<label><input type="radio" name="q15" value="a15-1">作成したい</label>
<label><input type="radio" name="q15" value="a15-2">特に考えたことがない</label>

<!-- Q16 -->
<label>Q16 真剣交際前に告知していた以外に持病やアレルギーはありますか？もしもの時病院で家族として伝えられるように些細なことも伝えておきましょう。</label>
<textarea id="q16" class="detail-textarea"></textarea>

<!-- Q17 -->
<label>Q17 日常的に服薬している薬などはありますか？それらを記録しているお薬手帳もしくはスマホアプリなどをパートナーと共有しておきましょう。</label>
<textarea id="q17" class="detail-textarea"></textarea>

<!-- Q18 -->
<label>Q18 持病やアレルギーを抑えるための頓服薬などはありますか？ある場合はどこに保管、所持するようにしているかも教えてください。また使い方が特殊なものはパートナーが補助できるように使い方も事前に教えておきましょう。</label>
<textarea id="q18" class="detail-textarea"></textarea>

<!-- Q19 -->
<label>Q19 過去の既往歴、手術歴はありますか？いつも病院のカルテで書いているような、医師に伝えるべき既往歴についてパートナーとも共有しておきましょう。</label>
<textarea id="q19" class="detail-textarea"></textarea>

<!-- Q20 -->
<label>Q20 もしもの時、延命措置や臓器移植などの希望はありますか？パートナーにも伝えておくようにしましょう。</label>
<textarea id="q20" class="detail-textarea"></textarea>

<div class="button-group">
  <button id="submitBtn" type="button">送信</button>
  <div class="sub-buttons">
    <button id="draftBtn" type="button">下書き保存</button>
    <button id="clearBtn" type="button">フォームクリア</button>
  </div>
</div>

<!-- 共有モーダル -->
<div id="shareModal" class="modal hidden">
  <div class="modal-content">
    <h3>共有</h3>
    <input id="shareName" placeholder="お名前を入力してください（任意）">
    <button id="shareBtn">共有する</button>
  </div>
</div>

</div>
<script src="app.js"></script>
</body>
</html>
