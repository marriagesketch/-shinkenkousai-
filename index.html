<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>結婚準備 すり合わせ</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

</head>

<body>
<div class="container">

<div class="form-header">
  <h1>結婚準備 すり合わせ</h1>
  <p class="form-description">本アンケートは、結婚準備にあたっての生活面・お金・もしもの時の希望などのすり合わせでの使用を目的としています。<br>
  プライバシー保護：LINE IDはハッシュ化（暗号化）して保存されます。表示名・プロフィール画像・メールアドレスなどは取得されません。<br>
  再回答について：同じLINEアカウントから回答された場合、以前の内容は上書きされます。</p>
</div>

<!-- ビューモード表示エリア（共有リンクで開いたとき） -->
<div id="viewMode"></div>

<!-- Q1 -->
<label>Q1 真剣交際に進もうと思ったのはなぜですか？パートナーのどんなところがいいなと思っていますか？</label>
<textarea id="q1" class="detail-textarea"></textarea>

<!-- Q2 -->
<label>Q2 この際だから言っておきたい、パートナーへの不満やもっとしてほしいことを伝えておきましょう。</label>
<textarea id="q2" class="detail-textarea"></textarea>

<!-- Q3 -->
<label>Q3 家事分担について、ルールを決めておきたいですか？</label>
<label><input type="radio" name="q3" value="a3-1">決めたい</label>
<label><input type="radio" name="q3" value="a3-2">一緒に暮らし始めてから決めたい</label>
<label><input type="radio" name="q3" value="a3-3">ルールは決めずにやっていきたい</label>

<!-- Q4 -->
<label>Q4 年収はいくらですか？今年の見込み年収を教えてください。副業があれば、本業、副業それぞれいくらかも教えてください。</label>
<textarea id="q4" class="detail-textarea"></textarea>

<!-- Q5 -->
<label>Q5 貯金はいくらありますか？現金での貯金額を教えてください。</label>
<textarea id="q5" class="detail-textarea"></textarea>

<!-- Q6 -->
<label>Q6 株などの金融資産や不動産など、現金以外での貯蓄があれば、何を持っているか、必要であれば現金化できるようなものか教えてください。</label>
<textarea id="q6" class="detail-textarea"></textarea>

<!-- Q7 -->
<label>Q7 現在の支出状況について教えてください。</label>
<textarea id="q7" class="detail-textarea"></textarea>

<!-- Q8 -->
<label>Q8 現在の勤め先で、結婚休暇などの結婚支援制度はありますか？あれば具体的に教えてください。</label>
<textarea id="q8" class="detail-textarea"></textarea>

<!-- Q9 -->
<label>Q9 現在の勤め先で、出産・育児支援制度はどんなものがありますか？</label>
<textarea id="q9" class="detail-textarea"></textarea>

<!-- Q10 -->
<label>Q10 ベッド、寝室について理想はありますか？</label>
<label><input type="radio" name="q10" value="a10-1">大きめのベッドで一緒に寝たい</label>
<label><input type="radio" name="q10" value="a10-2">同じ寝室でベッドは分けたい</label>
<label><input type="radio" name="q10" value="a10-3">寝室を分けたい</label>

<!-- Q11 -->
<label>Q11 結納や両家顔合わせはしますか？</label>
<label><input type="radio" name="q11" value="a11-1">したい</label>
<label><input type="radio" name="q11" value="a11-2">するつもりはないがお相手次第</label>
<label><input type="radio" name="q11" value="a11-3">自身の両親と話していないので後日相談させてほしい</label>

<!-- Q12 -->
<label>Q12 婚約指輪はほしいですか？もしくはあげたいですか？</label>
<label><input type="radio" name="q12" value="a12-1">ほしい、もしくはあげたい</label>
<label><input type="radio" name="q12" value="a12-2">相手が望むならあげたい</label>
<label><input type="radio" name="q12" value="a12-3">ほしくない、もしくはあげたくない</label>

<!-- Q13 -->
<label>Q13 結婚指輪はほしいですか？</label>
<label><input type="radio" name="q13" value="a13-1">ほしい</label>
<label><input type="radio" name="q13" value="a13-2">相手が望むならほしい</label>
<label><input type="radio" name="q13" value="a13-3">自分はいらないが、相手が望むなら相手の分はあげたい</label>
<label><input type="radio" name="q13" value="a13-4">自分はほしいが、相手の分は相手の意思に任せる</label>
<label><input type="radio" name="q13" value="a13-5">ほしくないし、あげたくもない</label>

<!-- Q14 -->
<label>Q14 結婚式はしたいですか？</label>
<label><input type="radio" name="q14" value="a14-1">したい</label>
<label><input type="radio" name="q14" value="a14-2">相手が望むならしてもよい</label>
<label><input type="radio" name="q14" value="a14-3">したくない</label>

<!-- Q15 -->
<label>Q15 フォトウェディングはしたいですか？</label>
<label><input type="radio" name="q15" value="a15-1">したい</label>
<label><input type="radio" name="q15" value="a15-2">相手が望むならしてもよい</label>
<label><input type="radio" name="q15" value="a15-3">したくない</label>

<!-- Q16 -->
<label>Q16 新婚旅行は行きたいですか？</label>
<label><input type="radio" name="q16" value="a16-1">海外旅行に行きたい</label>
<label><input type="radio" name="q16" value="a16-2">国内旅行に行きたい</label>
<label><input type="radio" name="q16" value="a16-3">新婚旅行に行くことはあまり考えていない</label>

<!-- Q17 -->
<label>Q17 婚前契約書の作成はしたいですか？</label>
<label><input type="radio" name="q17" value="a17-1">作成したい</label>
<label><input type="radio" name="q17" value="a17-2">特に考えたことがない</label>

<!-- Q18 -->
<label>Q18 真剣交際前に告知していた以外に持病やアレルギーはありますか？もしもの時病院で家族として伝えられるように些細なことも伝えておきましょう。</label>
<textarea id="q18" class="detail-textarea"></textarea>

<!-- Q19 -->
<label>Q19 日常的に服薬している薬などはありますか？それらを記録しているお薬手帳もしくはスマホアプリなどをパートナーと共有しておきましょう。</label>
<textarea id="q19" class="detail-textarea"></textarea>

<!-- Q20 -->
<label>Q20 持病やアレルギーを抑えるための頓服薬などはありますか？ある場合はどこに保管、所持するようにしているかも教えてください。また使い方が特殊なものはパートナーが補助できるように使い方も事前に教えておきましょう。</label>
<textarea id="q20" class="detail-textarea"></textarea>

<!-- Q21 -->
<label>Q21 過去の既往歴、手術歴はありますか？いつも病院のカルテで書いているような、医師に伝えるべき既往歴についてパートナーとも共有しておきましょう。</label>
<textarea id="q21" class="detail-textarea"></textarea>

<!-- Q22 -->
<label>Q22 もしもの時、延命措置や臓器移植などの希望はありますか？パートナーにも伝えておくようにしましょう。</label>
<textarea id="q22" class="detail-textarea"></textarea>

<!-- Q23 -->
<label>Q23 お金の管理方法はどうしたいですか？</label>
<label><input type="radio" name="q23" value="a23-1">どちらかに管理をお願いし、お小遣い制にする</label>
<label><input type="radio" name="q23" value="a23-2">共同口座を作り、生活費や将来のための貯蓄を定期的にお互い入金する</label>
<label><input type="radio" name="q23" value="a23-3">原則それぞれで管理し、支出が必要になるタイミングで支払う</label>
<label><input type="radio" name="q23" value="a23-4">その他</label>
<textarea id="q23Detail" class="detail-textarea"></textarea>

<!-- Q24 -->
<label>Q24 大きい買い物をするときは個人の買い物であっても相談したいですか？</label>

<label><input type="radio" name="q24" value="a24-1">大きい額のときは相談したい、してほしい</label>
<label>いくら以上ですか？</label><textarea id="q24Detail" class="detail-textarea"></textarea>
<label><input type="radio" name="q24" value="a24-2">個人の買い物は相談しなくてよい</label>

<!-- Q25 -->
<label>Q25 毎月どれくらい貯蓄したいですか？</label>
<textarea id="q25" class="detail-textarea"></textarea>

<!-- Q26 -->
<label>Q26 投資はしたいですか？</label>
<textarea id="q26" class="detail-textarea"></textarea>

<!-- Q27 -->
<label>Q27 保険への加入や、すでに加入している方はプランの変更など考えていますか？</label>
<textarea id="q27" class="detail-textarea"></textarea>

<!-- Q28 -->
<label>Q28 将来は何歳くらいまで働きたいですか？定年後も再雇用や非正規雇用で働き続けたいですか？</label>
<textarea id="q28" class="detail-textarea"></textarea>

<!-- Q29 -->
<label>Q29 将来、自分の親の介護が必要になった場合の現時点での計画はありますか？</label>
<textarea id="q29" class="detail-textarea"></textarea>

<!-- Q30 -->
<label>Q30 パートナーのSNSへ自身の写真が掲載されてもよいですか？</label>
<label><input type="radio" name="q30" value="a30-1">掲載してもよい</label>
<label><input type="radio" name="q30" value="a30-2">鍵付きのアカウントであれば掲載してもよい</label>
<label><input type="radio" name="q30" value="a30-3">掲載してもよいが公開前に相談してほしい、写真のチェックをしたい</label>
<label><input type="radio" name="q30" value="a30-4">顔がわからないような写真であれば写っていてもよい</label>
<label><input type="radio" name="q30" value="a30-5">掲載しないでほしい</label>

<!-- Q31 -->
<label>Q31 死亡時や働けなくなった時、会社独自の給与補償のようなものはありますか？</label>
<textarea id="q31" class="detail-textarea"></textarea>

<!-- Q32 -->
<label>Q32 結婚後、定期的な話し合いの機会を設けますか？</label>
<label><input type="radio" name="q32" value="a32-1">月に1回以上話し合う約束をしたい</label>
<label><input type="radio" name="q32" value="a32-2">1シーズンに1回以上話し合う約束をしたい</label>
<label><input type="radio" name="q32" value="a32-3">半年に1回以上話し合う約束をしたい</label>
<label><input type="radio" name="q32" value="a32-4">1年に1回以上話し合う約束をしたい</label>
<label><input type="radio" name="q32" value="a32-5">頻度は決めず、気になったときに話し合いたい</label>

<!-- Q33 -->
<label>Q33 パートナーから何と呼ばれたいですか？</label>
<textarea id="q33" class="detail-textarea"></textarea>

<!-- Q34 -->
<label>Q34 パートナーの友人付き合いについて、どこまで関与しても平気ですか？</label>
<label><input type="radio" name="q32" value="a34-1">パートナーの友人</label>
<label><input type="radio" name="q32" value="a34-2">1シーズンに1回以上話し合う約束をしたい</label>
<label><input type="radio" name="q32" value="a34-3">半年に1回以上話し合う約束をしたい</label>
<label><input type="radio" name="q32" value="a34-4">1年に1回以上話し合う約束をしたい</label>
<label><input type="radio" name="q32" value="a34-5">頻度は決めず、気になったときに話し合いたい</label>

<div class="button-group">
  <button id="submitBtn" type="button">送信</button>
  <div class="sub-buttons">
    <button id="draftBtn" type="button">下書き保存</button>
    <button id="clearBtn" type="button">フォームクリア</button>
  </div>
</div>

<!-- 共有モーダル -->
<div id="shareModal" class="modal hidden">
  <div class="modal-content">
    <h3>共有</h3>
    <input id="shareName" placeholder="お名前を入力してください（任意）">
    <button id="shareBtn">共有する</button>
  </div>
</div>

</div>
<script src="app.js"></script>
</body>
</html>
